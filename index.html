<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네가 들려주는 이야기 - 오프닝</title>
    <link rel="stylesheet" href="/src/index.css">
    <style>
      :root {
        --olive-soft: #5a5a40;
        --cream-light: #fdfbf7;
      }

      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 15px rgba(90, 90, 64, 0.1)); }
        50% { filter: drop-shadow(0 0 25px rgba(90, 90, 64, 0.25)); }
      }

      .fade-in {
        animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .floating {
        animation: float 4s ease-in-out infinite;
      }

      .book-card {
        background: linear-gradient(135deg, #ffffff 0%, #f9f7f2 100%);
        box-shadow: 
          0 10px 30px -5px rgba(0, 0, 0, 0.05),
          0 20px 50px -10px rgba(90, 90, 64, 0.1),
          inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        cursor: pointer;
      }

      .book-card:hover {
        transform: scale(1.05) translateY(-5px);
        box-shadow: 
          0 25px 60px -12px rgba(0, 0, 0, 0.08),
          0 35px 80px -15px rgba(90, 90, 64, 0.2),
          inset 0 0 0 1px rgba(255, 255, 255, 0.8);
      }

      .book-card:active {
        transform: scale(0.95) translateY(0);
        transition: all 0.2s ease;
      }

      .glow-effect {
        position: absolute;
        inset: -20px;
        background: radial-gradient(circle, rgba(90, 90, 64, 0.08) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
        border-radius: 50%;
      }

      .book-card:hover .glow-effect {
        opacity: 1;
      }

      .book-icon {
        color: var(--olive-soft);
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        transition: all 0.5s ease;
      }

      .book-card:hover .book-icon {
        transform: rotate(-3deg);
      }
    </style>
  </head>
  <body class="bg-warm-bg min-h-screen flex flex-col items-center justify-center overflow-hidden m-0 p-0">
    
    <div class="flex flex-col items-center justify-center text-center px-6 max-w-2xl w-full">
      
      <!-- Title Section -->
      <div class="fade-in mb-16">
        <h1 class="title text-5xl md:text-7xl font-bold text-stone-900 mb-6 tracking-tight break-keep">
          네가 들려주는<br /> 이야기
        </h1>
        <p class="text-stone-500 text-xl md:text-2xl italic font-light">
          작은 상상이, 하나의 이야기로
        </p>
      </div>

      <!-- Interaction Section -->
      <div class="fade-in" style="animation-delay: 0.4s; opacity: 0;">
        <a href="/main.html" class="inline-block relative group no-underline">
          <div class="floating">
            <div class="book-card relative p-16 md:p-20 rounded-[40px] border border-stone-100/50">
              <!-- Glow Background -->
              <div class="glow-effect"></div>
              
              <!-- Icon -->
              <div class="relative z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="book-icon">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
              </div>

              <!-- Decorative Corner Light -->
              <div class="absolute top-4 left-4 w-12 h-12 bg-white/40 rounded-full blur-xl pointer-events-none"></div>
            </div>
          </div>
          
          <!-- Guide Text -->
          <div class="mt-12 text-stone-400 text-sm md:text-base uppercase tracking-[0.4em] font-medium opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0 transition-all duration-700 ease-out">
            책을 열어 이야기를 시작하세요
          </div>
        </a>
      </div>

    </div>

    <!-- Background Decorative Elements -->
    <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
      <div class="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] bg-olive/5 rounded-full blur-[150px]"></div>
      <div class="absolute bottom-[-15%] right-[-10%] w-[50%] h-[50%] bg-earth/5 rounded-full blur-[150px]"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-radial from-white/20 to-transparent"></div>
    </div>

  </body>
</html>
